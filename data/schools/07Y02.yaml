admission_requirements:
  selection_criteria: 'For grade 5 (grundständig track): admission based on Förderprognose average grade, at least grade 2 in German, and passing an entrance aptitude test (Eignungstest); in case of oversubscription, 50% weighting on test result and 50% on core subject grades. For grade 7 (standard entry): Förderprognose Durchschnittsnote is the primary ranking criterion; Probeunterricht required if Notensumme in Deutsch, Mathematik and first foreign language exceeds 14 across the last two half-year reports.'
  probeunterricht: true
  entrance_test: true
  notes: 'School publishes transparent admission criteria for 2026/2027 on its website. Two separate intake tracks exist: bilingual French/AbiBac track (grade 5) and standard/MINT track (grade 7). For the bilingual grade-5 track, prior French or English as first foreign language at primary school is both accepted.'
