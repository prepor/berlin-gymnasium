admission_requirements:
  oversubscribed: true
  selection_criteria: "Admission to grade 5 (grundständiger Zweig) regulated as 'Schule besonderer pädagogischer Prägung': priority to pupils continuing their grade-3 foreign language; ranked by sum of grades in Deutsch, Fremdsprache, Mathematik, Sachunterricht from the grade-4 mid-year report (Notensumme 4–6 first, then 7–9, then higher). If more than 60 applicants with Notensumme 4–6, a standardised selection interview (up to 50 points) is held; top 60 scores are admitted. Grade 7 admission follows §56 Schulgesetz. School has been consistently oversubscribed; listing as second or third choice has not been successful in recent years."
  probeunterricht: false
  entrance_test: false
  notes: Standardised selection interview (ca. 20 min, reading aloud, language knowledge, logical reasoning, up to 50 points) is used only as a tiebreaker when grade-sum group exceeds capacity. No fixed GPA threshold can be stated in advance due to variable application numbers. Bilingual Abitur (CertiLingua) available.
