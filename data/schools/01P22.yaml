  oversubscribed: true
  selection_criteria: Applicants must demonstrate good to very good academic results (grades, conduct, social skills), 
    and bilingual proficiency in English and German at near-native level. From grade 5, one of French or Spanish as 
    second foreign language also required. Gymnasium applicants invited to entrance test and trial day if a place 
    becomes available. Sibling preference applied.
  probeunterricht: true
  entrance_test: true
  notes: IB World School (PYP and Diploma Programme) as well as bilingual Abitur (Deutsch/Englisch). Only Berlin 
    international gymnasium offering both IB Diploma and bilingual Abitur. Gymnasium started grade 7 onwards (secondary 
    entry from grade 7). School opened as secondary school in 2009. Non-profit, private fee-paying. Students 
    specialising in sciences and music/dance given admission priority.
