admission_requirements:
  selection_criteria: 'Primary criterion is the Durchschnittsnote der Förderprognose (GPA of the primary school recommendation). For Musikklasse admission: 60% GPA score, 10% prior attendance of music-oriented primary school stream, 30% result of a school-administered Musiktest. In case of tied scores, a lottery decides. Lottery (§56(6)3 SchulG) does not apply to the Musikklasse.'
