admission_requirements:
  selection_criteria: Admission from grade 7; gymnasial recommendation required. If Notensumme of Deutsch, Mathematik, and first foreign language from Halbjahrszeugnisse 5.2 and 6.1 exceeds 14 (average worse than ~2.3), a Probeunterricht certificate is required. At oversubscription, multi-stage selection applies. For music and MINT profile classes, a separate selection procedure is always conducted. Profile preference (Regelklasse, MINT, music) indicated at registration.
  probeunterricht: true
  entrance_test: false
  notes: 'Three class profiles offered per year: Regelklasse, MINT-profilierte Klasse, and musische Klasse. Music profile has long tradition since 1997; includes mandatory ensemble participation, instrument lessons. MINT profile includes special science promotion, partnerships with TU Berlin and Berlin Zoo. School located in Berlin-Hermsdorf. Digital registration introduced.'
